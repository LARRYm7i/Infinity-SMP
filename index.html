<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="." />
    <title>Infinity SMP</title>

    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon.png?v=999" />
    <link rel="shortcut icon" href="/assets/favicon.png?v=999" />
    <link rel="apple-touch-icon" href="/assets/favicon.png?v=999" />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="top">
      <section class="hero" aria-labelledby="hero-title">
        <div class="hero-bg" aria-hidden="true">
          <img class="hero-image active" src="assets/end.png" alt="" />
          <img class="hero-image" src="assets/overworld.png" alt="" />
          <img class="hero-image" src="assets/nether.png" alt="" />
        </div>
        <div class="hero-shade" aria-hidden="true"></div>

        <div class="hero-content">
          <p class="eyebrow">Minecraft survival multiplayer</p>
          <h1 id="hero-title">Infinity SMP</h1>

          <div class="ip-panel" id="ip">
            <button
              class="copy-button"
              type="button"
              data-copy-ip
              aria-label="Copier l'adresse infinity-smp.net dans le presse papier"
            >
              <span class="button-kicker">Adresse du serveur</span>
              <span class="server-ip">infinity-smp.net</span>
            </button>

            <a
              class="discord-button"
              href="https://discord.gg/6GyZZaHAA9"
              target="_blank"
              rel="noopener noreferrer"
            >
              Rejoindre le Discord
            </a>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
